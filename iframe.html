<!-- 
    <iframe> - elemento que trá conteúdo externo

    -atributos,

        -src
        - height
        - width
        - title (acessibilidade)
        - allowfullscren
        - frameborder - ta prestes a cair em desuso - olhar 
        o site abaixo

        Peguei, no EXEMPLO 1 abaixo, uma
        música que eu gosto, cliquei em compartilhar
        e incorporar e, com isso, vamos analisar o inframe

        ATENÇÃO: o Iframe tem que ser usado com aenção e cautela, pois
        dependerá da política da página, para entender mais acesse:
        developer.mozilla.org/en-US/docs/Web/HTML/Elemente/iframe



 -->
 
 <!-- EXEMPLO 1 -->
<iframe 
    width="560"
    height="315" 
    src="https://www.youtube.com/embed/JFyuOEovTOE" 
    title="YouTube video player" frameborder="0" 
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
    allowfullscreen
    title="Música para a Ester">   
</iframe>
