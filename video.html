<!-- Vimos, no exemplo 1, que no browser do
próprio VS o vídeo não funcionou, então nós teriamos 
que colocar explicando o tipo de video:

<video src="./video_lyric.mp4"
type="video/mp4"></video>

O HTML é complexo para trabalharmos com videos
então a dica é conferir em:
developer.mozilla.org/pt-BR/docs/Web/Media/Formats

que tem como h1: "Media type and format guide: image, audio and video content
e pesquisa no canto superior direito:
"media type and format guide"
-->

<!-- EXEMPLO 2

-->
<video controls
    widht="150"
    height="150"
    autoplay
    preload="metadata"
    muted
>

<source src="./video_lyric.mp4" type="video/mp4">
<p> Este browser não suporta vídeo, baixe-o <a href="./video_lyric.mp4">aqui</a></p> 
<a href="./video_lyric.mp4"></a>

</video>
